<div class="auth-page">
  <div class="grid-bg"></div>
  <div class="auth-card animate-in">
    <div class="auth-header">
      <div class="logo">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="url(#rg)"/>
          <path d="M8 16L14 22L24 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="rg" x1="0" y1="0" x2="32" y2="32">
            <stop offset="0%" stop-color="#6366F1"/><stop offset="100%" stop-color="#4338CA"/>
          </linearGradient></defs>
        </svg>
        <span>DocMind</span>
      </div>
      <h1>Create account</h1>
      <p>Start building your knowledge base</p>
    </div>

    @if (error()) {
      <div class="error-banner">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Email</label>
        <input formControlName="email" type="email" placeholder="you@company.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input formControlName="password" type="password" placeholder="Min. 6 characters"/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input formControlName="confirm" type="password" placeholder="Re-enter password"/>
      </div>
      <button type="submit" class="submit-btn" [disabled]="form.invalid || loading()">
        @if (loading()) { <span class="spinner"></span> Creating account... }
        @else { Create Account
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        }
      </button>
    </form>
    <p class="auth-footer">Already have an account? <a routerLink="/auth/login">Sign in</a></p>
  </div>
</div>
